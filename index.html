<!DOCTYPE html>
<html lang="pt-br" data-tema="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniLog | Seu Portal de Animes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="nav-container">
            <h1 class="logo" onclick="window.location.reload()">AniLog</h1>
            
            <nav class="navbar">
                <ul class="nav-links">
                    <li class="dropdown">
                        <a href="#" class="nav-item" onclick="mostrarSecao('anime')">Animes ▾</a>
                        <ul class="dropdown-menu">
                            <li><a href="#" onclick="filtrar('top', 'anime')">Mais Populares</a></li>
                            <li><a href="#" onclick="filtrar('seasons/now', 'anime')">Nova Temporada</a></li>
                            <li><a href="#" onclick="abrirModalCategorias('anime')">Categorias (Gêneros)</a></li>
                        </ul>
                    </li>

                    <li class="dropdown">
                        <a href="#" class="nav-item" onclick="mostrarSecao('manga')">Mangás ▾</a>
                        <ul class="dropdown-menu">
                            <li><a href="#" onclick="filtrar('top', 'manga')">Mais Populares</a></li>
                            <li><a href="#" onclick="abrirModalCategorias('manga')">Categorias</a></li>
                        </ul>
                    </li>

                    <li><a href="lista.html">Minha Lista</a></li>
                </ul>
            </nav>

            <div class="nav-right">
                <div class="busca-box">
                    <input type="text" id="inputBusca" placeholder="Pesquisar...">
                    <button onclick="realizarBusca()">🔍</button>
                </div>
                <button id="btn-tema" class="tema-toggle" onclick="alternarTema()">🌙</button>
            </div>
        </div>
    </header>

    <main>
        <section id="secao-destaque" class="destaque-wrapper">
            <div class="container">
                <div class="sessao-titulo">
                    <span>Lançamentos & Notícias</span>
                    <h2>Destaques da Semana</h2>
                </div>
                <div id="anime-destaque">
                    </div>
            </div>
        </section>

        <section id="secao-explorar" class="conteudo-principal hidden">
            <div class="container">
                <div class="header-grid">
                    <h2 id="titulo-pagina-atual">Animes Populares</h2>
                </div>

                <div id="container-cards" class="grid-animes">
                    </div>

                <div id="paginacao" class="paginacao-container">
                    </div>
            </div>
        </section>
    </main>

    <div id="modal-avaliacao" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Adicionar à Lista</h3>
                <button onclick="fecharModal()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="anime-info-modal"></div>
                <label>Sua Nota (0-10):</label>
                <input type="number" id="nota-anime" min="0" max="10" step="0.5">
                <label>O que achou?</label>
                <textarea id="comentario-anime" placeholder="Escreva sua opinião..."></textarea>
                <button class="btn-salvar" onclick="salvarNaLista()">Salvar na Minha Lista</button>
            </div>
        </div>
    </div>

    <div id="modal-categorias" class="modal hidden">
        <div class="modal-content">
            <h3>Escolha um Gênero</h3>
            <div id="lista-generos" class="generos-grid"></div>
            <button onclick="fecharModalCategorias()" class="btn-fechar">Fechar</button>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
